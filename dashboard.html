<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - نظام المهام التعاوني</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard">
        <nav class="sidebar">
            <div class="user-info">
                <h3 id="username">مرحباً!</h3>
                <button onclick="logout()">تسجيل خروج</button>
            </div>
            <ul class="nav-links">
                <li class="active" onclick="showSection('my-tasks')">📋 مهامي</li>
                <li onclick="showSection('shared-with-me')">🤝 مشتركة معي</li>
            </ul>
        </nav>
        
        <main class="content">
            <section id="my-tasks" class="active-section">
                <h2>مهامي</h2>
                <div class="add-task">
                    <input type="text" id="newTaskTitle" placeholder="عنوان المهمة">
                    <textarea id="newTaskDesc" placeholder="وصف المهمة"></textarea>
                    <button onclick="addTask()">إضافة مهمة</button>
                </div>
                <div id="tasksList" class="tasks-list"></div>
            </section>
            
            <section id="shared-with-me" class="hidden-section">
                <h2>مهام مشتركة معي</h2>
                <div id="sharedTasksList" class="tasks-list"></div>
            </section>
        </main>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/shared.js"></script>
</body>
</html>
